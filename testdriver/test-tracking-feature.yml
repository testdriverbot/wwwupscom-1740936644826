steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: >-
      Enter a test tracking number in the "Tracking Number or InfoNotice®" input
      field.
    commands:
      - command: hover-text
        text: Tracking Number or InfoNotice®
        description: input field for tracking number
        action: click
      - command: type
        text: 123456789
  - prompt: Click the "Track" button.
    commands:
      - command: hover-text
        text: Track
        description: button to track the package
        action: click
  - prompt: >-
      Assert that the tracking results page or error message is displayed.  #
      Use the content of the file from the environment
    commands:
      - command: assert
        expect: Currently, we are not able to provide the tracking details.
